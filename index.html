<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de login</title>
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/mediaquery.css">
</head>
<body>
    <main>
        <section id="login">
            <div id="imagem">

            </div>
            <div id="formulario">
                <h1>Login</h1>
                <p>seja bem-vindo! faça login para acessar sua conta  e poder fazer as configurações nesse ambiente <br><br></p>
                <form action="login.php" method="post">
                    <div class="campo">
                        <label for="ilogin">Login</label>
                        <input type="email" name="login" id="ilogin" placeholder="Digite seu email" required autocomplete="email">
                        
                    </div>
                    <div class="campo">
                        <label for="isenha">Senha</label>
                        <input type="password" name="senha" id="isenha" placeholder="Digite sua senha" required autocomplete="current-password">
                    </div>
                    <input type="submit" value="entrar">
                    <a href="esquecisenha.html">Esqueci minha senha</a>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
